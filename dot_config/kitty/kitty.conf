include ./theme.conf
shell_integration  no-cursor
cursor_shape block
cursor_blink_interval 0.75
enable_audio_bell no

map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard
map ctrl+shift+enter launch --type=os-window --cwd=current
map ctrl+shift+space launch --type=overlay --title=dropdown

font_family DejaVuSansM Nerd Font Mono
symbol_map U+30A0-U+30FF Noto Sans Mono CJK JP
font_size 13.0
bold_font        auto
italic_font      auto
bold_italic_font auto
# Scale down the brightness of text (0.0 = invisible, 1.0 = full)
# dim_opacity 0.25
# window_logo_path /home/thadryan/Vaults/Home/Areas/Art/Backgrounds/rapture-modified.png
# window_logo_path /home/thadryan/Vaults/Home/Areas/Art/Backgrounds/spidey-venom.jpg
window_logo_path /home/thadryan/Vaults/Home/Areas/Art/Backgrounds/spidey-venom-low-exposure.jpg

window_logo_position center
window_logo_alpha .35
# this isn't recognized on the debian stable version :(
# window_logo_scale 100
hide_window_decorations yes
detect_mod_key_press yes

# so weird!
# cursor_trail 3
# cursor_trail_decay 0.1 0.4

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME

copy_on_select yes
