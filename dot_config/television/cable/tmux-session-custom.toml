[metadata]
name = "tmux-sessions"
description = "List and manage tmux sessions"
requirements = ["tmux"]

[source]
command = "tmux list-sessions -F '#{session_name}\t#{session_windows} windows\t#{session_created_string}'"
display = "{split:\t:0} ({split:\t:1})"
output = "{split:\t:0}"

[preview]
command = "tmux capture-pane -t '{split:\t:0}' -p 2>/dev/null || echo 'No preview available'"

[keybindings]
enter = "actions:attach"
ctrl-p = "actions:spawn-pi"
ctrl-r = "reload_source"

[actions.attach]
description = "Attach to the selected session"
command = "exec tmux attach-session -t '{split:\t:0}'"
mode = "execute"

[actions.kill]
description = "Kill the selected session"
command = "tmux kill-session -t '{split:\t:0}'"
mode = "fork"

[actions.spawn-pi]
description = "Spawn {session}-pi with pi running"
command = "tmux new-session -d -s '{split:\t:0}-pi' && tmux send-keys -t '{split:\t:0}-pi' 'pi' C-m"
mode = "fork"
