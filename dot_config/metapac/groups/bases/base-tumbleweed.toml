zypper = { packages = [
  { name = "noctalia-shell", hooks = { before_install = [
    "sh", "-c", "sudo zypper addrepo https://download.opensuse.org/repositories/home:Fisiu:apps/openSUSE_Tumbleweed/ home:Fisiu:apps && sudo zypper addrepo https://download.opensuse.org/repositories/home:ericfrs/openSUSE_Tumbleweed/ home:ericfrs && sudo zypper refresh"
  ]}},
  { name = "go", hooks = { after_install = [
    "sh", "-c", "git clone https://github.com/dlvhdr/diffnav.git /tmp/diffnav && cd /tmp/diffnav && go install ."
  ] } },
  { name = "emacs", hooks = { after_install = [
    "sh", "-c", "rm -rf ~/.emacs ~/.emacs.d && git clone --depth 1 https://github.com/doomemacs/core ~/.config/emacs && ~/.config/emacs/bin/doom install"
  ] } },
  "just",
  "ShellCheck",
  { name = "python314-uv", hooks = { after_install = [
    # this is a hack to get pixi as well as uv - same vibe at least
    "sh", "-c", "mkdir -p ~/.config/pixi/manifests && curl -fsSL https://pixi.sh/install.sh | sh"
  ] } },
  "fuzzel",
  "wofi",
  "watchexec",
  "krb5-client",
  "wl-clipboard",
