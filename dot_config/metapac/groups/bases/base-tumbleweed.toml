  ] } },
  { name = "qt6ct", hooks = { before_install = [
    "sh", "-c", "sudo zypper addrepo https://download.opensuse.org/repositories/KDE:Qt6/openSUSE_Tumbleweed/ KDE:Qt6 && sudo zypper refresh"
