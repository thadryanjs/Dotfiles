name: opthalmology-llm
root: /home/thadryan/Vaults/Projects/Work/Primary/RCD/OpthalmologyLLM/Code
windows:
  - code:
      panes:
        - bash -c "uv run nvim; exec bash"
        - bash
      commands:
        - tmux resize-pane -t 0 -x 66%
  - git:
      panes:
        - bash -c "lazygit; exec bash"
  - bash:
      panes:
        - bash
  - server:
      panes:
        - bash -c "cd /mnt/Workspace/OpthalmologyLLM && uv run nvim -R -c 'set nomodifiable'; exec bash"
        - bash -c "cd /mnt/Workspace/OpthalmologyLLM && exec bash"
      commands:
        - tmux resize-pane -t 0 -x 66%
