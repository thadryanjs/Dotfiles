name: dev-remote
root: '.'
windows:
  - code:
      panes:
        - bash -c "nvim; exec bash"
  - git:
      panes:
        - bash -c "lazygit; exec bash"
  - bash:
      panes:
        - bash
  - server:
      panes:
        - bash -c "cd /mnt/Workspace && nvim -R -c 'set nomodifiable'; exec bash"
        - bash -c "cd /mnt/Workspace && exec bash"
      commands:
        - tmux resize-pane -t 0 -x 66%
